<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <title>SML - Invalid Request</title>
</head>

<body class="p-3 m-0 border-0 bg-example m-0 border-0 ">
<nav th:replace="~{fragments/navigationbar :: navigationbar}"></nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="alert alert-danger" role="alert">
                <p class="mb-2" th:if="${error == 'invalidSameSiteRequest'}">외부 페이지에서 시작된 요청은 처리할 수 없습니다.</p>
                <p class="mb-2" th:if="${error == 'invalidCsrfToken'}">요청 검증에 실패했습니다.</p>
                <p class="mb-0">서비스 내부화면에서 다시 시도해 주세요.</p>
            </div>
            <a class="btn btn-primary" href="/">홈으로 이동</a>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
